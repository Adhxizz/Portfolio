<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="botBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150C28"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="botHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bubbleG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#10D9C4"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#botBg)"/>
  <circle cx="500" cy="90" r="90" fill="#7C3AED" opacity="0.1"/>
  <circle cx="80" cy="320" r="70" fill="#10D9C4" opacity="0.08"/>

  <g transform="translate(220, 130)">
    <rect x="50" y="-22" width="10" height="22" rx="4" fill="#7C3AED"/>
    <circle cx="55" cy="-28" r="7" fill="#10D9C4"/>

    <rect x="0" y="0" width="160" height="120" rx="22" fill="url(#botHead)"/>

    <rect x="28" y="40" width="34" height="34" rx="10" fill="#0B1220"/>
    <rect x="98" y="40" width="34" height="34" rx="10" fill="#0B1220"/>
    <circle cx="45" cy="57" r="5" fill="#10D9C4"/>
    <circle cx="115" cy="57" r="5" fill="#10D9C4"/>

    <rect x="55" y="88" width="50" height="8" rx="4" fill="#0B1220" opacity="0.6"/>

    <rect x="-18" y="40" width="16" height="40" rx="8" fill="#7C3AED"/>
    <rect x="162" y="40" width="16" height="40" rx="8" fill="#7C3AED"/>
  </g>

  <g transform="translate(60, 90)">
    <rect width="170" height="50" rx="16" fill="#0B1220" stroke="#1C2233" stroke-width="1.5"/>
    <text x="20" y="22" font-family="monospace" font-size="12" fill="#E6E9F2">Hi! How can I</text>
    <text x="20" y="38" font-family="monospace" font-size="12" fill="#E6E9F2">help you today?</text>
  </g>

  <g transform="translate(370, 90)">
    <rect width="170" height="44" rx="16" fill="url(#bubbleG)"/>
    <text x="18" y="27" font-family="monospace" font-size="12" fill="#0B1220">Book an appointment</text>
  </g>

  <g transform="translate(60, 290)">
    <rect width="190" height="44" rx="16" fill="#0B1220" stroke="#1C2233" stroke-width="1.5"/>
    <text x="18" y="27" font-family="monospace" font-size="12" fill="#E6E9F2">Sure, here are open slots</text>
  </g>

  <g transform="translate(420, 290)">
    <circle cx="0" cy="20" r="4" fill="#10D9C4">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="20" r="4" fill="#10D9C4">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="28" cy="20" r="4" fill="#10D9C4">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
